values:
  repo_URL: https://github.com/ForumViriumHelsinki/TFDS_SIMPL-open_data_consumer.git
  branch: v3.0.1

project: ${PROJECT}
domainSuffix: ${DOMAINSUFFIX}
namespaceTag:
  consumer: ${NAMESPACETAG}
  authority: ${AUTHNAMESPACETAG}
  common: ${COMMONSPACETAG}

resourcePreset: default
# resourcePreset: low

argocd:
  appname: ${NAMESPACE}
  namespace: ${ARGOCDNAMESPACE}

cluster:
  address: https://kubernetes.default.svc
  namespace: ${NAMESPACE}
  commonToolsNamespace: ${COMMONNAMESPACE}
  issuer: ${CLUSTERISSUER}

secrets:
  secretEngine: ${SECRETENGINE}
  role: ${SECRETROLE}

redis:
  repo_URL: 'https://charts.bitnami.com/bitnami'
  targetRevision: 19.6.0
  chart_name: redis
  nameOverride: redis
  resourcesPreset: "none"
  resources:
    requests:
      cpu: "0"
      memory: "0"
  valueFiles:
    - values.yaml

redis_commander:
  enabled: false
  repo_URL: 'https://github.com/joeferner/redis-commander.git'
  targetRevision: master
  nameOverride: redis-commander
  path: 'k8s/helm-chart/redis-commander'
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  valueFiles:
    - values.yaml

keycloak:
  repo_URL: https://charts.bitnami.com/bitnami
  chart_name: keycloak
  targetRevision: 22.2.5
  nameOverride: keycloak
  resourcesPreset: "none"
  resources:
    requests:
      cpu: "500m"
      memory: "500Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  valueFiles:
    - values.yaml

